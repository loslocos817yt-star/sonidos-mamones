<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonidos mamones.com</title>
    <style>
        body {
            background-image: url('fondo.jpg');
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: sans-serif;
            text-align: center;
            padding: 20px;
        }

        h1 {
            text-shadow: 10px 2px 4px rgba(0, 0, 0, 0.8);
        }

        p {
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.8);
            background-color: rgba(0, 0, 0, 0.4);
            display: inline-block;
            padding: 8px 15px;
            border-radius: 8px;
        }

        .contenedor-sonidos {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        /* Botones completamente circulares y chidos */
        .boton-sonido {
            background-color: #ff4757;
            color: white;
            border: none;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            word-wrap: break-word;
            overflow: hidden;
        }

        .boton-sonido:hover {
            background-color: #ff6b81;
            transform: scale(1.08);
        }

        .boton-sonido:active {
            transform: scale(0.92);
        }
    </style>
</head>
<body>

    <h1>Sonidos Mamones.com</h1>
    <p>Soy gay xdd.</p>

    <div class="contenedor-sonidos" id="lista-sonidos"></div>

    <script>
        fetch('sonidos.json')
            .then(respuesta => respuesta.json())
            .then(sonidos => {
                const contenedor = document.getElementById('lista-sonidos');

                sonidos.forEach(sonido => {
                    const boton = document.createElement('button');
                    boton.className = 'boton-sonido';
                    boton.innerText = sonido.nombre;

                    boton.addEventListener('click', () => {
                        const audio = new Audio(sonido.url);
                        audio.play();
                    });

                    contenedor.appendChild(boton);
                });
            })
            .catch(error => console.error('Error cargando los sonidos:', error));
    </script>

</body>
</html>
